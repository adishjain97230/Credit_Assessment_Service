# =============================================================================
# Production Redis (self-hosted VM, systemd) — template for django-ratelimit cache
# -----------------------------------------------------------------------------
# In repo:       config/redis.conf  (template; no secrets committed)
# On server:     /etc/redis/redis.conf
# After deploy: sudo systemctl enable redis-server && sudo systemctl start redis-server
# Test:          redis-cli -a YOUR_PASSWORD ping
# =============================================================================

# --- Network ---
bind 127.0.0.1 -::1
protected-mode yes
port 6379
tcp-backlog 511
tcp-keepalive 300
timeout 300

# --- Process (systemd: keep foreground) ---
daemonize no
supervised systemd
pidfile /var/run/redis/redis-server.pid

# --- Logging ---
loglevel notice
logfile /var/log/redis/redis.log
syslog-enabled no
databases 16

# --- Security (set on server; do not commit real password) ---
# requirepass REPLACE_ME_STRONG_PASSWORD

# --- Memory ---
maxmemory 2gb
maxmemory-policy volatile-lru
maxmemory-samples 10

# --- Data & persistence ---
dir /var/lib/redis
dbfilename dump.rdb
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes

maxclients 10000
slowlog-log-slower-than 10000
slowlog-max-len 128