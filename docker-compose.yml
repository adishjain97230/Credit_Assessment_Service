services:
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    command: uvicorn credit_site.asgi:application --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped
    depends_on:
      - redis
    # volumes:
      # - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,13.236.109.109
      - REDIS_URL=redis://redis:6379/1