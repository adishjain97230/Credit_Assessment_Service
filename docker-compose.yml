services:
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  web:
    build: .
    command: uvicorn credit_site.asgi:application --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # volumes:
      # - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,13.236.109.109
      - REDIS_URL=redis://redis:6379/1

volumes:
  redis-data: